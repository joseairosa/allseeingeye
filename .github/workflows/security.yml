name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly full-history sweep, Mondays at 04:00 UTC.
    - cron: "0 4 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # PRs scan only the diff. Push to main + scheduled cron scan
          # full history.
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fail the job on any finding. Critical / high stop the merge;
          # low / medium are surfaced for triage but still block here -
          # it's a release-grade gate.
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust 1.95.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-bin-v1

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit > /dev/null; then
            cargo install cargo-audit --locked
          fi

      - name: Audit Rust deps
        working-directory: apps/desktop/src-tauri
        run: cargo audit --deny warnings

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust 1.95.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Loaded from `deny.toml` at repo root.
          command: check
          arguments: --workspace --all-features

  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=ndjson

      - name: Audit npm deps
        # `--audit-level high` so low / moderate findings inform but
        # don't block. Critical / high block the merge.
        run: pnpm audit --audit-level high --prod
