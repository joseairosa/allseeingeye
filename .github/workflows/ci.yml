name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14      # arm64
          - macos-13      # x64
          - ubuntu-latest
          - windows-latest

    env:
      # Tauri 2 looks at this for unstable APIs; harmless on Linux/Windows runners.
      RUST_BACKTRACE: short
      # Speed up cargo by skipping cargo-audit-style updates.
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust 1.95.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy,rustfmt

      - name: Cache cargo registry and target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          shared-key: ${{ matrix.os }}

      - name: Install Linux Tauri build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install JS dependencies
        # `--reporter=ndjson` keeps the "Ignored build scripts" notice from
        # turning into a CI warning trail; esbuild's postinstall is allowed
        # via pnpm's approved-builds list when needed.
        run: pnpm install --frozen-lockfile --reporter=ndjson

      - name: Rebuild esbuild (allow native binary fetch)
        run: pnpm rebuild esbuild
        shell: bash

      - name: Typecheck
        run: pnpm --filter @aseye/desktop typecheck

      - name: Typecheck UI package
        run: pnpm --filter @aseye/ui typecheck

      - name: Lint (desktop)
        run: pnpm --filter @aseye/desktop lint

      - name: Frontend build
        run: pnpm --filter @aseye/desktop build

      - name: Storybook build
        run: pnpm --filter @aseye/ui build-storybook

      - name: Cargo fmt check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --all -- --check

      - name: Cargo check
        working-directory: apps/desktop/src-tauri
        run: cargo check --all-targets --locked

      - name: Cargo clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Cargo test
        working-directory: apps/desktop/src-tauri
        run: cargo test --all-targets --locked
