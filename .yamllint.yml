---
# yamllint config for All Seeing Eye.
# - GitHub Actions uses `on:` as a key; the default `truthy` rule
#   misclassifies it as a boolean.
# - 120-char line length matches our code style for long URL strings,
#   `${{ secrets.* }}` interpolations, and shell heredocs.
extends: default

rules:
  line-length:
    max: 140
    level: warning
  truthy:
    check-keys: false
  comments:
    min-spaces-from-content: 1
  document-start: disable
